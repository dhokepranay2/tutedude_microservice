apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend
  namespace: microservices-app
  labels:
    app: flask-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
      - name: backend
        # Point this to your actual Docker Hub repository
        image: docker.io/dhokepranay2/flask-backend:latest 
        # Changed to Always (or IfNotPresent) so it pulls from the internet
        imagePullPolicy: Always 
        ports:
        - containerPort: 5000
        env:
        - name: ATLAS_URI
          value: "mongodb+srv://{dbuser}:{dbpwd}@cluster-tutedude.a7b1lkz.mongodb.net/?retryWrites=true&w=majority&appName=Cluster-Tutedude"

---
apiVersion: v1
kind: Service
metadata:
  name: flask-backend-service
  namespace: microservices-app
spec:
  selector:
    app: flask-backend
  ports:
    - port: 5000
      targetPort: 5000